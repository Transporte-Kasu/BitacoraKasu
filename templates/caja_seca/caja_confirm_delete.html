{% extends 'base.html' %}
{% block title %}Eliminar {{ object.numero_economico }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8 text-center">
    <div class="bg-red-100 rounded-full p-4 w-16 h-16 mx-auto mb-4 flex items-center justify-center">
      <svg class="h-8 w-8 text-red-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
    </div>
    <h2 class="text-lg font-bold text-slate-900 mb-2">¿Eliminar caja seca?</h2>
    <p class="text-sm text-slate-500 mb-6">Se eliminará <strong>{{ object.numero_economico }}</strong> permanentemente.</p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold px-6 py-2.5 rounded-lg">Eliminar</button>
      <a href="{% url 'caja_seca:list' %}" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-medium px-6 py-2.5 rounded-lg">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
